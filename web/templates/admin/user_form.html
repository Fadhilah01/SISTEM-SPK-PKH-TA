{% extends 'base.html' %}
{% block title %}Tambah Admin Baru{% endblock %}

{% block content %}
<div class="stagger-container py-3">
    <!-- Header -->
    <div class="mb-4">
        <h4 class="mb-1"><i class="bi bi-person-plus"></i> Tambah Pengguna Admin Baru</h4>
        <p class="text-muted small">Daftarkan akun administrator dinas sosial baru ke dalam sistem SPK.</p>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border border-light border-opacity-10">
                <div class="card-header bg-transparent border-bottom border-light border-opacity-10 py-3">
                    <h6 class="mb-0 fw-semibold text-dark-emphasis">Form Pendaftaran Admin</h6>
                </div>
                <div class="card-body py-4">
                    <form method="POST" action="{{ url_for('admin.tambah_user') }}">
                        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

                        <!-- Nama Lengkap -->
                        <div class="mb-3">
                            <label for="nama_lengkap" class="form-label">Nama Lengkap</label>
                            <input type="text" name="nama_lengkap" id="nama_lengkap" class="form-control" 
                                   placeholder="Contoh: Budi Santoso" required autofocus>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control" 
                                   placeholder="Contoh: budi123" required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" 
                                   placeholder="Minimal 6 karakter" required>
                        </div>

                        <!-- Role -->
                        <div class="mb-4">
                            <label for="role" class="form-label">Hak Akses (Role)</label>
                            <select name="role" id="role" class="form-select" required>
                                <option value="admin" selected>Admin (Pendamping Biasa)</option>
                                <option value="superadmin">Superadmin (Administrator Utama)</option>
                            </select>
                        </div>

                        <!-- Aksi Form -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="{{ url_for('admin.list_users') }}" class="btn btn-secondary px-4">
                                Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
