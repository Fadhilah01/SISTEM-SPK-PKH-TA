{% extends 'base.html' %}
{% block title %}Ganti Password{% endblock %}

{% block content %}
<div class="stagger-container py-3">
    <!-- Header -->
    <div class="mb-4">
        <h4 class="mb-1"><i class="bi bi-key"></i> Pengaturan Kredensial</h4>
        <p class="text-muted small">Perbarui kata sandi untuk mengamankan akun akses admin Anda.</p>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border border-light border-opacity-10">
                <div class="card-header bg-transparent border-bottom border-light border-opacity-10 py-3">
                    <h6 class="mb-0 fw-semibold text-dark-emphasis">Form Ganti Password</h6>
                </div>
                <div class="card-body py-4">
                    <form method="POST" action="{{ url_for('auth.change_password') }}">
                        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

                        <!-- Password Lama -->
                        <div class="mb-3">
                            <label for="old_password" class="form-label">Password Lama</label>
                            <div class="input-group">
                                <input type="password" name="old_password" id="old_password" class="form-control border-end-0"
                                       placeholder="Masukkan password saat ini" required>
                                <button type="button" class="input-group-text bg-light text-muted border-start-0 password-toggle" data-target="old_password" title="Tampilkan/Sembunyikan password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Password Baru -->
                        <div class="mb-3">
                            <label for="new_password" class="form-label">Password Baru</label>
                            <div class="input-group">
                                <input type="password" name="new_password" id="new_password" class="form-control border-end-0"
                                       placeholder="Minimal 6 karakter" required>
                                <button type="button" class="input-group-text bg-light text-muted border-start-0 password-toggle" data-target="new_password" title="Tampilkan/Sembunyikan password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Konfirmasi Password Baru -->
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Konfirmasi Password Baru</label>
                            <div class="input-group">
                                <input type="password" name="confirm_password" id="confirm_password" class="form-control border-end-0"
                                       placeholder="Ulangi password baru" required>
                                <button type="button" class="input-group-text bg-light text-muted border-start-0 password-toggle" data-target="confirm_password" title="Tampilkan/Sembunyikan password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Aksi Form -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-shield-check"></i> Perbarui
                            </button>
                            <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary px-4">
                                Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
